# Vaultwarden — plugin-drafted, EXPANDED for the eval. bringup: compose-pull (constructed root compose pulls
# vaultwarden/server, single-service SQLite, SIGNUPS_ALLOWED=true). blocker: none (RUNNABLE) — self-register.
# Every journey starts from FRESH state (O-6): any journey that needs a logged-in vault registers a throwaway
# account first (Create account -> email + name -> master password), kept short, then does the one task.
# NOTE: vault item journeys type a THROWAWAY password/master password into the vault (captured verbatim in the
# recording — fine, it's a disposable test vault, the values are obviously fake).
up:
  url: http://localhost:8000
  health: /
  ready_timeout_s: 300
journeys:
  - name: register-new-account
    goal: A brand-new visitor opens the web vault, goes to "Create account", and registers with an email and a master password, then proceeds into the app.
    success: The vault is open showing the empty-vault state with the "New"/"Add item" button and the account's email visible in the top-right account menu.
  - name: log-in-existing-account
    goal: A visitor who has just registered a throwaway account signs out, then signs back in from the login screen using that email and master password to reach their vault.
    success: The vault page is open and unlocked, showing the signed-in account's email in the top-right account menu and the vault item list (or empty-vault state).
  - name: add-login-item
    goal: A newly-registered, signed-in user creates a new Login item in their vault, giving it a name, a username, and a throwaway password value.
    success: The vault item list shows the newly created Login entry by its name, with a username displayed beneath it.
  - name: add-card-item
    goal: A newly-registered, signed-in user adds a new Card item to their vault with a name, a cardholder name, and a throwaway card number.
    success: The vault item list shows the newly created Card entry by its name, marked with the card type icon.
  - name: add-identity-item
    goal: A newly-registered, signed-in user adds a new Identity item to their vault with a name and some identity details such as a first and last name.
    success: The vault item list shows the newly created Identity entry by its name, marked with the identity type icon.
  - name: add-secure-note
    goal: A newly-registered, signed-in user adds a new Secure Note item to their vault with a name and some note body text.
    success: The vault item list shows the newly created Secure Note entry by its name, marked with the note (sticky-note) type icon.
  - name: create-folder
    goal: A newly-registered, signed-in user opens the folder controls and creates a new folder to organize vault items.
    success: The left-hand Folders section of the vault lists the newly created folder by its name.
  - name: generate-password
    goal: A newly-registered, signed-in user opens the password generator tool and generates a strong random password.
    success: The password generator screen shows a freshly generated random password string in the generated-password field along with the regenerate and length/options controls.
  - name: search-vault-items
    goal: A newly-registered, signed-in user who has just added a uniquely-named Login item to their vault uses the vault search box to filter down to that item by typing part of its name.
    success: The vault item list is filtered to show the matching Login entry by its unique name, with non-matching items hidden.
  - name: view-account-settings
    goal: A newly-registered, signed-in user opens their account settings/profile page to review their account details.
    success: The account settings page is open showing the user's profile fields (such as the account email or name) and account management options.
